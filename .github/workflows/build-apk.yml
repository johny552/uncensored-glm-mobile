name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      
      - name: Configure EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Add projectId to app.json under expo.extra.eas
          python3 << 'EOF'
          import json
          with open('app.json', 'r') as f:
            config = json.load(f)
          if 'extra' not in config['expo']:
            config['expo']['extra'] = {}
          config['expo']['extra']['eas'] = {'projectId': 'uncensored-glm-mobile'}
          with open('app.json', 'w') as f:
            json.dump(config, f, indent=2)
          EOF
      
      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --non-interactive --wait
      
      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GLM-4-Assistant
          path: '**/*.apk'
          retention-days: 30
          if-no-files-found: warn
