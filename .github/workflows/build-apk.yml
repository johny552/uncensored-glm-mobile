name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      
      - name: Create EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Create the EAS project - this will prompt for confirmation but we'll auto-confirm
          echo "uncensored-glm-mobile" | eas project:create --non-interactive || true
          
          # Get the project info and extract the projectId
          PROJECT_INFO=$(eas project:info --non-interactive 2>&1 || echo "")
          echo "Project Info: $PROJECT_INFO"
      
      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Build the APK
          eas build --platform android --profile preview --non-interactive --wait
      
      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GLM-4-Assistant
          path: '**/*.apk'
          retention-days: 30
          if-no-files-found: warn
