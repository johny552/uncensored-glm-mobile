name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      
      - name: Create and configure EAS project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Try to create the project - it might already exist
          eas project:create --non-interactive 2>&1 || true
          
          # Get the project info
          PROJECT_OUTPUT=$(eas project:info --json 2>&1 || echo "{}")
          echo "Project output: $PROJECT_OUTPUT"
          
          # Extract projectId from the output and write to eas.json
          python3 << 'EOF'
          import json
          import subprocess
          
          # Try to get project info
          try:
            result = subprocess.run(['eas', 'project:info', '--json'], 
                                  capture_output=True, text=True, timeout=10)
            if result.returncode == 0:
              project_info = json.loads(result.stdout)
              project_id = project_info.get('id')
              if project_id:
                print(f"Found projectId: {project_id}")
                
                # Update eas.json with the projectId
                with open('eas.json', 'r') as f:
                  eas_config = json.load(f)
                
                eas_config['projectId'] = project_id
                
                with open('eas.json', 'w') as f:
                  json.dump(eas_config, f, indent=2)
                
                print(f"✅ Updated eas.json with projectId: {project_id}")
          except Exception as e:
            print(f"Error: {e}")
          EOF
      
      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --non-interactive --wait
      
      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GLM-4-Assistant
          path: '**/*.apk'
          retention-days: 30
          if-no-files-found: warn
